# =============================================================================
# NanoClaw Packet Filter (pf) Configuration for FreeBSD
# =============================================================================
#
# WHEN TO USE THIS FILE:
#   Use this standalone configuration if pf is NOT already configured on your
#   system. This file provides a complete, self-contained pf ruleset that will
#   handle all firewall rules for both NanoClaw jails and the host system.
#
#   If you already have /etc/pf.conf configured, use pf-nanoclaw-anchor.conf
#   instead, which integrates NanoClaw rules into your existing configuration.
#
# Purpose: Network isolation for NanoClaw vnet jails with epair interfaces.
# Allows only:
#   - Outbound HTTPS to api.anthropic.com (Claude API)
#   - Outbound DNS to resolve api.anthropic.com
#   - Blocks all other jail egress traffic
#
# Architecture:
#   - Each jail gets a vnet (virtual network stack)
#   - Host creates an epair interface pair: epairN (host side) and epairNb (jail side)
#   - Each jail N uses subnet 10.99.N.0/30 from the /16 pool:
#     - Host side (epairNa): 10.99.N.1/30 — acts as gateway
#     - Jail side (epairNb): 10.99.N.2/30 — jail's IP
#   - Each jail has its own /30 subnet (no IP collisions)
#   - Jail has a default route via its gateway (10.99.N.1)
#
# =============================================================================
# INSTALLATION
# =============================================================================
#
#   AUTOMATIC SETUP (Recommended):
#     Run the setup script which auto-detects your external interface:
#       scripts/setup-freebsd.sh
#
#   MANUAL SETUP:
#
#   1. Detect your external interface:
#      route -n get default | grep 'interface:' | awk '{print $2}'
#      # Common values: re0, em0, igb0, bge0, vtnet0
#
#   2. Configure the interface:
#      # Edit ext_if line in this file (line ~114)
#      ext_if = "em0"  # Replace NANOCLAW_EXT_IF_PLACEHOLDER with your interface
#
#      Note: The setup script automatically handles this substitution
#
#   3. Enable IP forwarding (required for jail NAT):
#      sysctl net.inet.ip.forwarding=1
#      # Make persistent - add to /etc/sysctl.conf:
#      net.inet.ip.forwarding=1
#
#   4. Enable pf in /etc/rc.conf:
#      pf_enable="YES"
#      pf_rules="/path/to/nanoclaw/src/etc/pf-nanoclaw.conf"
#
#   5. Load the ruleset:
#      sudo pfctl -f /path/to/nanoclaw/src/etc/pf-nanoclaw.conf
#
#      Note: setup-freebsd.sh copies this file to /etc/pf-nanoclaw.conf
#      and substitutes the correct interface automatically.
#
#   6. Enable pf if not already running:
#      sudo pfctl -e
#
# =============================================================================
# VERIFICATION COMMANDS
# =============================================================================
#
#   # Check pf status
#   sudo pfctl -s info
#
#   # Show loaded rules
#   sudo pfctl -s rules
#
#   # Show NAT rules
#   sudo pfctl -s nat
#
#   # Show state table (active connections)
#   sudo pfctl -s state
#
#   # Test from inside a jail (should work):
#   sudo jexec nanoclaw_test curl -I https://api.anthropic.com
#
#   # Test from inside a jail (should be blocked):
#   sudo jexec nanoclaw_test curl -I https://google.com
#
#   # Watch blocked packets in real-time:
#   sudo tcpdump -n -e -ttt -i pflog0
#
# =============================================================================
# CONFIGURATION
# =============================================================================

# --- Interface Definitions ---
# External interface configuration
#
# CONFIGURATION OPTIONS (in order of precedence):
#
#   1. Environment variable (runtime):
#      Set NANOCLAW_EXT_IF before running setup-freebsd.sh to override detection.
#      Example:
#        NANOCLAW_EXT_IF=em0 sudo -E ./scripts/setup-freebsd.sh
#      The setup script will use this value instead of auto-detecting.
#
#   2. Auto-detection (recommended):
#      The setup script automatically detects your primary network interface using:
#        route -n get default | grep 'interface:' | awk '{print $2}'
#      This works for most standard configurations.
#
#   3. Manual configuration:
#      After setup, you can edit /etc/pf-nanoclaw.conf directly and reload:
#        sudo vi /etc/pf-nanoclaw.conf  # Change ext_if line
#        sudo pfctl -f /etc/pf.conf     # Reload rules
#
# Common interface names by driver:
#   - re0, re1...    : Realtek (common in consumer hardware)
#   - em0, em1...    : Intel PRO/1000 (common in servers)
#   - igb0, igb1...  : Intel Gigabit (newer servers)
#   - bge0, bge1...  : Broadcom NetXtreme
#   - vtnet0, vtnet1 : VirtIO (virtual machines/cloud)
#   - ix0, ix1...    : Intel 10G
#
# To verify your interface:
#   ifconfig -l               # List all interfaces
#   route -n get default      # Show default route with interface
#   netstat -rn | grep default # Alternative way to check default route
#
# PLACEHOLDER: This line will be replaced by setup-freebsd.sh
# If you see NANOCLAW_EXT_IF_PLACEHOLDER below, the setup script hasn't run yet.
ext_if = "NANOCLAW_EXT_IF_PLACEHOLDER"  # Replaced by setup script with detected or specified interface

# Standard loopback
lo_if = "lo0"

# --- Network Definitions ---
# Jail network - entire /16 pool for dynamic per-jail allocation
# Each jail N uses subnet 10.99.N.0/30:
#   - Host gateway: 10.99.N.1
#   - Jail IP: 10.99.N.2
# This allows up to 256 concurrent jails (N=0-255)
jail_net = "10.99.0.0/16"

# --- Allowed Destinations ---
# Claude API endpoint - SECURITY: Using pinned IP ranges instead of DNS resolution
# to prevent DNS poisoning attacks that could enable MitM (see ticket nan-042c).
#
# Current Anthropic API IP range (as of 2026-03-16):
#   IPv4: 160.79.104.0/21 (covers 160.79.104.0 - 160.79.111.255)
#   IPv6: 2607:6bc0::/48
#
# IMPORTANT: These IP ranges are stable and documented by Anthropic, but should
# be verified periodically. If api.anthropic.com connections fail, check:
#   1. Current DNS resolution: host api.anthropic.com
#   2. Official docs: https://platform.claude.com/docs/en/api/ip-addresses
#   3. Update this table if ranges have changed (rare, but announced in advance)
#
# Maintenance procedure:
#   1. Verify new IP ranges from official Anthropic documentation
#   2. Update the CIDR blocks below
#   3. Reload ruleset: sudo pfctl -f /path/to/pf-nanoclaw.conf
#   4. Verify table contents: sudo pfctl -t anthropic_api -T show
#   5. Test connectivity: sudo jexec <jail> curl -I https://api.anthropic.com
table <anthropic_api> persist { 160.79.104.0/21, 2607:6bc0::/48 }

# DNS servers - restricted to trusted servers only
# Google DNS: 8.8.8.8
# Cloudflare DNS: 1.1.1.1
trusted_dns = "{ 8.8.8.8, 1.1.1.1 }"

# --- Options ---
# Don't filter on loopback (standard practice)
set skip on lo0

# Optimization for modern systems
set optimization normal

# Log blocked packets to pflog0 for debugging
set loginterface $ext_if

# Block policy: return RST/ICMP unreachable (helps debugging vs silent drop)
set block-policy return

# --- Scrub ---
# Normalize packets (reassemble fragments, etc.)
scrub in on $ext_if all fragment reassemble

# =============================================================================
# NAT RULES
# =============================================================================

# NAT jail traffic going to the internet through the external interface
nat on $ext_if from $jail_net to any -> ($ext_if)

# =============================================================================
# FILTER RULES
# =============================================================================
# Rules are evaluated first-to-last. With 'quick', first match wins.
# Order matters: allow rules for jail traffic must come BEFORE the block rule.

# --- Jail Network Rules (vnet with epair) ---
#
# Traffic flow: jail (10.99.N.2) -> epairNb -> epairNa (host) -> IP forwarding -> re0
# Each jail N has its own epair pair with unique /30 subnet from 10.99.0.0/16 pool.
# Host side: 10.99.N.1/30, Jail side: 10.99.N.2/30
#
# IMPORTANT: Requires IP forwarding enabled:
#   sysctl net.inet.ip.forwarding=1
# Make persistent in /etc/sysctl.conf:
#   net.inet.ip.forwarding=1

# --- External Interface (re0) Rules ---

# Pass all non-jail traffic on external interface (don't break host networking)
pass on $ext_if all

# Allow jail -> credential proxy on host gateway (10.99.N.1:3001)
# Jails route all API traffic through the credential proxy instead of direct to api.anthropic.com
# The proxy runs on the host (bound to all jail gateways) and injects real credentials, so jails never see them
# Each jail connects to its own gateway IP (10.99.N.1) which is handled by the proxy
# Port 3001 is the default CREDENTIAL_PROXY_PORT (can be overridden via env var)
# Note: This rule covers all gateway IPs in the 10.99.0.0/16 range
pass quick proto tcp from $jail_net to $jail_net port 3001 keep state

# --- Inter-Jail Network Isolation ---
# Block direct jail-to-jail traffic (defense in depth)
# Each jail can only reach its gateway (10.99.N.1) for the credential proxy
# This blocks any attempt by one jail to reach another jail's IP within the /16
# Note: The "pass quick" rule above for port 3001 matches first, allowing jail->gateway
# This rule blocks remaining jail_net->jail_net traffic (jail A -> jail B)
block drop quick from $jail_net to $jail_net

# Allow jail -> DNS (UDP and TCP, port 53)
# Required for the credential proxy to resolve api.anthropic.com
# Restricted to trusted DNS servers only (8.8.8.8 and 1.1.1.1) to prevent DNS tunneling
pass out quick on $ext_if proto udp from $jail_net to $trusted_dns port 53 keep state
pass out quick on $ext_if proto tcp from $jail_net to $trusted_dns port 53 keep state

# Allow jail -> api.anthropic.com:443 (HTTPS)
# This allows the credential proxy (running on the host) to forward requests to the real API
# The jails themselves connect to the proxy, not directly here
pass out quick on $ext_if proto tcp from $jail_net to <anthropic_api> port 443 keep state

# Block all other jail traffic on external interface
# Log blocked attempts for debugging/auditing
block return log quick on $ext_if from $jail_net to any

# --- Internal Interfaces (epair) ---

# Block all epair traffic by default, then allow specific services.
# Without this block, pf's default-pass policy allows all jail traffic on epair,
# creating state entries that bypass the re0 block rules above.
# Destinations match the $ext_if rules above for defense-in-depth.
block on epair all
pass quick on epair proto tcp to port 3001
pass quick on epair proto { tcp, udp } to $trusted_dns port 53
pass quick on epair proto tcp to <anthropic_api> port 443

# Pass all traffic on loopback
pass on $lo_if all

# =============================================================================
# NOTES
# =============================================================================
#
# 1. Jail Network Architecture:
#    Each jail N gets its own vnet (virtual network stack) with an epair.
#    Jail N uses subnet 10.99.N.0/30 from the /16 pool:
#    - Host side (epairNa): 10.99.N.1/30 — acts as gateway
#    - Jail side (epairNb): 10.99.N.2/30 — jail's IP
#    No IP collisions since each jail has its own isolated /30 subnet.
#    Supports up to 256 concurrent jails (N=0-255).
#
# 2. Epair Lifecycle:
#    jail-runtime.ts handles epair creation/destruction with per-jail IPs:
#      - Create: ifconfig epair create → returns "epairN"
#      - Configure host: ifconfig epairNa 10.99.N.1/30 up
#      - Start jail with: vnet, vnet.interface=epairNb
#      - Configure jail: jexec <jail> ifconfig epairNb 10.99.N.2/30 up
#      - Add route: jexec <jail> route add default 10.99.N.1
#      - Cleanup: ifconfig epairNa destroy (destroys both sides)
#
# 3. DNS Resolution:
#    Jails use a generated resolv.conf with the trusted DNS servers
#    (8.8.8.8, 1.1.1.1) matching the trusted_dns macro above. This ensures
#    jail DNS queries are always allowed by the pf rules regardless of what
#    DNS servers the host uses.
#
# 4. Updating Anthropic API IPs:
#    SECURITY NOTE: IPs are pinned (not DNS-resolved) to prevent DNS poisoning.
#    If api.anthropic.com connections fail or Anthropic announces IP changes:
#      1. Verify new ranges: https://platform.claude.com/docs/en/api/ip-addresses
#      2. Update table definition in this file (line ~100)
#      3. Reload ruleset: sudo pfctl -f /path/to/pf-nanoclaw.conf
#      4. Verify: sudo pfctl -t anthropic_api -T show
#
#    DO NOT use dynamic DNS resolution commands like:
#      sudo pfctl -t anthropic_api -T replace api.anthropic.com  # INSECURE
#    This defeats the security protection against DNS poisoning attacks.
#
# 5. Debugging Blocked Traffic:
#    sudo tcpdump -n -e -ttt -i pflog0
#    This shows all packets matching 'block log' rules
#
# 6. Performance:
#    The 'quick' keyword ensures matching packets don't traverse the entire
#    ruleset. State tracking ('keep state') means return traffic is
#    automatically allowed without additional rule evaluation.
#
# =============================================================================
