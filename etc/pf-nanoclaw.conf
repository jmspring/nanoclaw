# =============================================================================
# NanoClaw Packet Filter (pf) Configuration for FreeBSD
# =============================================================================
#
# Purpose: Network isolation for NanoClaw jails. Allows only:
#   - Outbound HTTPS to api.anthropic.com (Claude API)
#   - Outbound DNS to resolve api.anthropic.com
#   - Communication with host for IPC and management
#   - Blocks all other jail egress traffic
#
# =============================================================================
# INSTALLATION OPTIONS
# =============================================================================
#
# OPTION A: Standalone (replaces existing pf.conf - NOT recommended if you have
#           existing pf rules)
#
#   1. Create the loopback interface for jails:
#      sudo ifconfig lo1 create
#      sudo ifconfig lo1 inet 10.99.0.1/24
#
#   2. Make lo1 persistent across reboots - add to /etc/rc.conf:
#      cloned_interfaces="lo1"
#      ifconfig_lo1="inet 10.99.0.1/24"
#
#   3. Enable pf in /etc/rc.conf:
#      pf_enable="YES"
#      pf_rules="/home/jims/code/nanoclaw/src/etc/pf-nanoclaw.conf"
#
#   4. Load the ruleset:
#      sudo pfctl -f /home/jims/code/nanoclaw/src/etc/pf-nanoclaw.conf
#
#   5. Enable pf if not already running:
#      sudo pfctl -e
#
# OPTION B: As an anchor in existing pf.conf (RECOMMENDED)
#
#   1. Create the loopback interface (same as Option A, steps 1-2)
#
#   2. Add these lines to your /etc/pf.conf:
#
#      # NanoClaw jail network
#      nanoclaw_net = "10.99.0.0/24"
#      nanoclaw_if = "lo1"
#
#      # NAT anchor for NanoClaw (must be in nat section, before filter rules)
#      nat-anchor "nanoclaw"
#
#      # Filter anchor for NanoClaw
#      anchor "nanoclaw"
#
#      # Load the anchor rules
#      load anchor "nanoclaw" from "/home/jims/code/nanoclaw/src/etc/pf-nanoclaw-anchor.conf"
#
#   3. Create pf-nanoclaw-anchor.conf with just the nat and filter rules
#      (see ANCHOR VERSION section at the bottom of this file)
#
#   4. Reload pf:
#      sudo pfctl -f /etc/pf.conf
#
# =============================================================================
# VERIFICATION COMMANDS
# =============================================================================
#
#   # Check pf status
#   sudo pfctl -s info
#
#   # Show loaded rules
#   sudo pfctl -s rules
#
#   # Show NAT rules
#   sudo pfctl -s nat
#
#   # Show state table (active connections)
#   sudo pfctl -s state
#
#   # Test from inside a jail (should work):
#   sudo jexec nanoclaw_test curl -I https://api.anthropic.com
#
#   # Test from inside a jail (should be blocked):
#   sudo jexec nanoclaw_test curl -I https://google.com
#
#   # Watch blocked packets in real-time:
#   sudo tcpdump -n -e -ttt -i pflog0
#
# =============================================================================
# CONFIGURATION
# =============================================================================

# --- Interface Definitions ---
# External interface: use 'egress' interface group (auto-detects default route)
ext_if = "egress"

# Jail loopback interface
jail_if = "lo1"

# Standard loopback
lo_if = "lo0"

# --- Network Definitions ---
# Jail network range
jail_net = "10.99.0.0/24"

# Host address on jail network (gateway for jails)
jail_gateway = "10.99.0.1"

# --- Allowed Destinations ---
# Claude API endpoint (resolved at rule load time; use table for dynamic updates)
# Note: api.anthropic.com resolves to multiple IPs; we use a table for flexibility
table <anthropic_api> persist { api.anthropic.com }

# DNS servers - use the host's configured resolvers
# On FreeBSD, typically 127.0.0.1 if running local-unbound, or external DNS
# Jails will use the host as their DNS resolver via jail_gateway
table <dns_servers> persist { 127.0.0.1, $jail_gateway }

# --- Options ---
# Don't filter on loopback (standard practice)
set skip on lo0

# Optimization for modern systems
set optimization normal

# Log blocked packets to pflog0 for debugging
set loginterface $jail_if

# Block policy: return RST/ICMP unreachable (helps debugging vs silent drop)
set block-policy return

# --- Scrub ---
# Normalize packets (reassemble fragments, etc.)
scrub in on $ext_if all fragment reassemble
scrub in on $jail_if all fragment reassemble

# =============================================================================
# NAT RULES
# =============================================================================

# NAT jail traffic going to the internet through the external interface
# Only applies to traffic that will be permitted by filter rules below
nat on $ext_if from $jail_net to any -> ($ext_if:0)

# =============================================================================
# FILTER RULES
# =============================================================================
# Rules are evaluated in order; first match wins (unless 'quick' is used)
# We use 'quick' for performance on high-traffic rules

# --- Default Policies ---
# Pass all traffic on external interface by default (don't break host networking)
pass on $ext_if all

# Pass all traffic on standard loopback
pass quick on $lo_if all

# --- Jail Network Rules ---

# Allow all traffic from host to jail network (for jexec, management, IPC)
pass quick on $jail_if from $jail_gateway to $jail_net

# Allow established/related connections back to jails
pass quick on $jail_if from any to $jail_net keep state

# Allow jail -> host gateway (for IPC via loopback, DNS queries to local resolver)
pass quick on $jail_if proto { tcp, udp } from $jail_net to $jail_gateway

# Allow jail -> DNS (UDP and TCP, port 53)
# Required for resolving api.anthropic.com before HTTPS connection
pass out quick on $ext_if proto udp from $jail_net to <dns_servers> port 53 keep state
pass out quick on $ext_if proto tcp from $jail_net to <dns_servers> port 53 keep state

# Allow jail -> api.anthropic.com:443 (HTTPS)
# This is the only external destination jails can reach
pass out quick on $ext_if proto tcp from $jail_net to <anthropic_api> port 443 keep state

# --- Block Everything Else from Jails ---
# Log blocked attempts for debugging/auditing
block log quick on $ext_if from $jail_net to any
block log quick on $jail_if from $jail_net to any

# =============================================================================
# ANCHOR VERSION (for inclusion in existing pf.conf)
# =============================================================================
# If using Option B above, create pf-nanoclaw-anchor.conf with these rules:
#
# --- START ANCHOR CONTENT ---
# # NAT jail traffic (this goes in the nat-anchor)
# nat on egress from 10.99.0.0/24 to any -> (egress:0)
#
# # Filter rules (this goes in the filter anchor)
# table <anthropic_api> persist { api.anthropic.com }
# table <dns_servers> persist { 127.0.0.1, 10.99.0.1 }
#
# # Allow host -> jail
# pass quick on lo1 from 10.99.0.1 to 10.99.0.0/24
#
# # Allow established connections
# pass quick on lo1 from any to 10.99.0.0/24 keep state
#
# # Allow jail -> host gateway
# pass quick on lo1 proto { tcp, udp } from 10.99.0.0/24 to 10.99.0.1
#
# # Allow jail -> DNS
# pass out quick on egress proto udp from 10.99.0.0/24 to <dns_servers> port 53 keep state
# pass out quick on egress proto tcp from 10.99.0.0/24 to <dns_servers> port 53 keep state
#
# # Allow jail -> Claude API
# pass out quick on egress proto tcp from 10.99.0.0/24 to <anthropic_api> port 443 keep state
#
# # Block all other jail egress
# block log quick on egress from 10.99.0.0/24 to any
# block log quick on lo1 from 10.99.0.0/24 to any
# --- END ANCHOR CONTENT ---

# =============================================================================
# NOTES
# =============================================================================
#
# 1. Jail IP Assignment:
#    Jails should be assigned IPs from 10.99.0.2 - 10.99.0.254
#    The host uses 10.99.0.1 as the gateway
#
# 2. Jail Configuration Changes Required:
#    In jail-runtime.js, change from 'ip4=inherit' to explicit IP assignment:
#      - Add: `ip4.addr=lo1|10.99.0.X` (where X is unique per jail)
#      - Remove: `ip4=inherit`, `ip6=inherit`
#
# 3. DNS Resolution:
#    Jails need /etc/resolv.conf pointing to the host:
#      nameserver 10.99.0.1
#    The host should run local-unbound or forward DNS appropriately
#
# 4. Updating Anthropic API IPs:
#    If api.anthropic.com IPs change and connections fail:
#      sudo pfctl -t anthropic_api -T replace api.anthropic.com
#    Or for a complete refresh:
#      sudo pfctl -t anthropic_api -T flush
#      sudo pfctl -t anthropic_api -T add api.anthropic.com
#
# 5. Debugging Blocked Traffic:
#    sudo tcpdump -n -e -ttt -i pflog0
#    This shows all packets matching 'block log' rules
#
# 6. Performance:
#    The 'quick' keyword ensures matching packets don't traverse the entire
#    ruleset. State tracking ('keep state') means return traffic is
#    automatically allowed without additional rule evaluation.
#
# =============================================================================
