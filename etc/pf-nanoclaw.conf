# =============================================================================
# NanoClaw Packet Filter (pf) Configuration for FreeBSD
# =============================================================================
#
# Purpose: Network isolation for NanoClaw vnet jails with epair interfaces.
# Allows only:
#   - Outbound HTTPS to api.anthropic.com (Claude API)
#   - Outbound DNS to resolve api.anthropic.com
#   - Blocks all other jail egress traffic
#
# Architecture:
#   - Each jail gets a vnet (virtual network stack)
#   - Host creates an epair interface pair: epairN (host side) and epairNb (jail side)
#   - Host side (epairNa): 10.99.0.1/30 — acts as gateway
#   - Jail side (epairNb): 10.99.0.2/30 — jail's IP
#   - Each jail has its own /30 subnet (no IP collisions)
#   - Jail has a default route via 10.99.0.1
#
# =============================================================================
# INSTALLATION
# =============================================================================
#
#   1. Enable IP forwarding (required for jail NAT):
#      sysctl net.inet.ip.forwarding=1
#      # Make persistent - add to /etc/sysctl.conf:
#      net.inet.ip.forwarding=1
#
#   2. Enable pf in /etc/rc.conf:
#      pf_enable="YES"
#      pf_rules="/home/jims/code/nanoclaw/src/etc/pf-nanoclaw.conf"
#
#   3. Load the ruleset:
#      sudo pfctl -f /home/jims/code/nanoclaw/src/etc/pf-nanoclaw.conf
#
#   4. Enable pf if not already running:
#      sudo pfctl -e
#
# =============================================================================
# VERIFICATION COMMANDS
# =============================================================================
#
#   # Check pf status
#   sudo pfctl -s info
#
#   # Show loaded rules
#   sudo pfctl -s rules
#
#   # Show NAT rules
#   sudo pfctl -s nat
#
#   # Show state table (active connections)
#   sudo pfctl -s state
#
#   # Test from inside a jail (should work):
#   sudo jexec nanoclaw_test curl -I https://api.anthropic.com
#
#   # Test from inside a jail (should be blocked):
#   sudo jexec nanoclaw_test curl -I https://google.com
#
#   # Watch blocked packets in real-time:
#   sudo tcpdump -n -e -ttt -i pflog0
#
# =============================================================================
# CONFIGURATION
# =============================================================================

# --- Interface Definitions ---
# External interface: re0 is the external interface on scratchy.
# This may need to be changed on other systems (e.g., em0, igb0, etc.)
ext_if = "re0"

# Standard loopback
lo_if = "lo0"

# --- Network Definitions ---
# Jail network - each jail uses 10.99.0.2 on its own epair /30 subnet
# The gateway (host side) is always 10.99.0.1
jail_net = "10.99.0.0/30"
jail_gateway = "10.99.0.1"

# --- Allowed Destinations ---
# Claude API endpoint - SECURITY: Using pinned IP ranges instead of DNS resolution
# to prevent DNS poisoning attacks that could enable MitM (see ticket nan-042c).
#
# Current Anthropic API IP range (as of 2026-03-16):
#   IPv4: 160.79.104.0/21 (covers 160.79.104.0 - 160.79.111.255)
#   IPv6: 2607:6bc0::/48
#
# IMPORTANT: These IP ranges are stable and documented by Anthropic, but should
# be verified periodically. If api.anthropic.com connections fail, check:
#   1. Current DNS resolution: host api.anthropic.com
#   2. Official docs: https://platform.claude.com/docs/en/api/ip-addresses
#   3. Update this table if ranges have changed (rare, but announced in advance)
#
# Maintenance procedure:
#   1. Verify new IP ranges from official Anthropic documentation
#   2. Update the CIDR blocks below
#   3. Reload ruleset: sudo pfctl -f /path/to/pf-nanoclaw.conf
#   4. Verify table contents: sudo pfctl -t anthropic_api -T show
#   5. Test connectivity: sudo jexec <jail> curl -I https://api.anthropic.com
table <anthropic_api> persist { 160.79.104.0/21, 2607:6bc0::/48 }

# DNS servers - restricted to trusted servers only
# Google DNS: 8.8.8.8
# Cloudflare DNS: 1.1.1.1
trusted_dns = "{ 8.8.8.8, 1.1.1.1 }"

# --- Options ---
# Don't filter on loopback (standard practice)
set skip on lo0

# Optimization for modern systems
set optimization normal

# Log blocked packets to pflog0 for debugging
set loginterface $ext_if

# Block policy: return RST/ICMP unreachable (helps debugging vs silent drop)
set block-policy return

# --- Scrub ---
# Normalize packets (reassemble fragments, etc.)
scrub in on $ext_if all fragment reassemble

# =============================================================================
# NAT RULES
# =============================================================================

# NAT jail traffic going to the internet through the external interface
nat on $ext_if from $jail_net to any -> ($ext_if)

# =============================================================================
# FILTER RULES
# =============================================================================
# Rules are evaluated first-to-last. With 'quick', first match wins.
# Order matters: allow rules for jail traffic must come BEFORE the block rule.

# --- Jail Network Rules (vnet with epair) ---
#
# Traffic flow: jail (10.99.0.2) -> epairNb -> epairNa (host) -> IP forwarding -> re0
# Each jail has its own epair pair with a /30 subnet.
# Host side: 10.99.0.1/30, Jail side: 10.99.0.2/30
#
# IMPORTANT: Requires IP forwarding enabled:
#   sysctl net.inet.ip.forwarding=1
# Make persistent in /etc/sysctl.conf:
#   net.inet.ip.forwarding=1

# --- External Interface (re0) Rules ---

# Pass all non-jail traffic on external interface (don't break host networking)
pass on $ext_if all

# Allow jail -> credential proxy on host gateway (10.99.0.1:3001)
# Jails route all API traffic through the credential proxy instead of direct to api.anthropic.com
# The proxy runs on the host and injects real credentials, so jails never see them
# This rule allows traffic to stay local (jail -> host gateway) before the proxy forwards it
# Note: Traffic to 10.99.0.1 doesn't traverse $ext_if, but we allow it here for completeness
# Port 3001 is the default CREDENTIAL_PROXY_PORT (can be overridden via env var)
pass quick proto tcp from $jail_net to $jail_gateway port 3001 keep state

# Allow jail -> DNS (UDP and TCP, port 53)
# Required for the credential proxy to resolve api.anthropic.com
# Restricted to trusted DNS servers only (8.8.8.8 and 1.1.1.1) to prevent DNS tunneling
pass out quick on $ext_if proto udp from $jail_net to $trusted_dns port 53 keep state
pass out quick on $ext_if proto tcp from $jail_net to $trusted_dns port 53 keep state

# Allow jail -> api.anthropic.com:443 (HTTPS)
# This allows the credential proxy (running on the host) to forward requests to the real API
# The jails themselves connect to the proxy, not directly here
pass out quick on $ext_if proto tcp from $jail_net to <anthropic_api> port 443 keep state

# Block all other jail traffic on external interface
# Log blocked attempts for debugging/auditing
block return log quick on $ext_if from $jail_net to any

# --- Internal Interfaces ---

# Pass all traffic on epair interfaces (jail <-> host communication)
pass on epair

# Pass all traffic on loopback
pass on $lo_if all

# =============================================================================
# NOTES
# =============================================================================
#
# 1. Jail Network Architecture:
#    Each jail gets its own vnet (virtual network stack) with an epair.
#    - Host side (epairNa): 10.99.0.1/30 — acts as gateway
#    - Jail side (epairNb): 10.99.0.2/30 — jail's IP
#    No IP collisions since each jail has its own isolated /30 subnet.
#
# 2. Epair Lifecycle:
#    jail-runtime.js handles epair creation/destruction:
#      - Create: ifconfig epair create → returns "epairN"
#      - Configure host: ifconfig epairNa 10.99.0.1/30 up
#      - Start jail with: vnet, vnet.interface=epairNb
#      - Configure jail: jexec <jail> ifconfig epairNb 10.99.0.2/30 up
#      - Add route: jexec <jail> route add default 10.99.0.1
#      - Cleanup: ifconfig epairNa destroy (destroys both sides)
#
# 3. DNS Resolution:
#    Jails use a copy of the host's /etc/resolv.conf (done automatically
#    by jail-runtime.js). This allows jails to reach whatever DNS servers
#    the host uses without requiring a local resolver on the jail gateway.
#
# 4. Updating Anthropic API IPs:
#    SECURITY NOTE: IPs are pinned (not DNS-resolved) to prevent DNS poisoning.
#    If api.anthropic.com connections fail or Anthropic announces IP changes:
#      1. Verify new ranges: https://platform.claude.com/docs/en/api/ip-addresses
#      2. Update table definition in this file (line ~100)
#      3. Reload ruleset: sudo pfctl -f /path/to/pf-nanoclaw.conf
#      4. Verify: sudo pfctl -t anthropic_api -T show
#
#    DO NOT use dynamic DNS resolution commands like:
#      sudo pfctl -t anthropic_api -T replace api.anthropic.com  # INSECURE
#    This defeats the security protection against DNS poisoning attacks.
#
# 5. Debugging Blocked Traffic:
#    sudo tcpdump -n -e -ttt -i pflog0
#    This shows all packets matching 'block log' rules
#
# 6. Performance:
#    The 'quick' keyword ensures matching packets don't traverse the entire
#    ruleset. State tracking ('keep state') means return traffic is
#    automatically allowed without additional rule evaluation.
#
# =============================================================================
