# =============================================================================
# NanoClaw pf Anchor Rules (vnet/epair model)
# =============================================================================
#
# WHEN TO USE THIS FILE:
#   Use this anchor configuration if you ALREADY HAVE /etc/pf.conf configured
#   on your system. This file integrates NanoClaw firewall rules into your
#   existing pf configuration without disrupting other rules.
#
#   If pf is not yet configured on your system, use pf-nanoclaw.conf instead,
#   which provides a complete standalone ruleset.
#
# ARCHITECTURE (vnet/epair model):
#   Each jail gets a dedicated epair interface pair. The host side (epairNa)
#   is in the host's network stack. The jail side (epairNb) is in the jail's
#   vnet. pf rules on epair interfaces control jail traffic.
#
#   - Each jail N uses subnet 10.99.N.0/30 from the /16 pool:
#     - Host side (epairNa): 10.99.N.1/30 -- acts as gateway
#     - Jail side (epairNb): 10.99.N.2/30 -- jail's IP
#   - Inter-jail isolation is provided by vnet: each jail has its own network
#     stack and cannot see other jails' epair interfaces.
#
# This file is designed to be loaded as an anchor from an existing /etc/pf.conf
#
# Prerequisites in /etc/pf.conf (add these lines):
#
#   # NanoClaw jail network (add near top with other macros)
#   # Covers the entire /16 pool for dynamic per-jail allocation
#   nanoclaw_net = "10.99.0.0/16"
#
#   # NAT for jail traffic (add in NAT section, before filter rules)
#   nat-anchor "nanoclaw"
#   nat on egress from $nanoclaw_net to any -> (egress:0)
#
#   # Filter anchor (add in filter rules section)
#   anchor "nanoclaw"
#   load anchor "nanoclaw" from "/usr/local/etc/pf-nanoclaw-anchor.conf"
#
# Then reload: sudo pfctl -f /etc/pf.conf
#
# =============================================================================

# --- Tables ---
# Claude API endpoint (pinned IP ranges -- do not use hostname to avoid DNS dependency)
table <anthropic_api> persist { 160.79.104.0/21, 2607:6bc0::/48 }

# --- DNS Servers ---
# Trusted DNS servers only: Google DNS and Cloudflare DNS
trusted_dns = "{ 8.8.8.8, 1.1.1.1 }"

# --- Epair Interface Rules (jail <-> host gateway) ---
# Each jail communicates through its epairNa/epairNb pair.
# These rules match on the "epair" interface group (all epairNa host-side interfaces).

# Block all epair traffic by default, then allow specific services
block on epair all

# Allow credential proxy traffic (jail -> host gateway on port 3001)
# Jails route API traffic through the credential proxy on their gateway IP
pass quick on epair proto tcp to port 3001 keep state

# Allow DNS to trusted servers only (required for resolving api.anthropic.com)
pass quick on epair proto { tcp, udp } to $trusted_dns port 53 keep state

# Allow HTTPS to Anthropic API only (pinned IP ranges, not any port 443 destination)
pass quick on epair proto tcp to <anthropic_api> port 443 keep state

# --- Egress Rules (jail -> internet via external interface) ---

# DNS to trusted servers from jail subnet
pass out quick on egress proto { tcp, udp } from 10.99.0.0/16 to $trusted_dns port 53 keep state

# HTTPS to Anthropic API only from jail subnet
pass out quick on egress proto tcp from 10.99.0.0/16 to <anthropic_api> port 443 keep state

# Block and log everything else from jail subnet on egress
# View blocked packets with: sudo tcpdump -n -e -ttt -i pflog0
block log quick on egress from 10.99.0.0/16 to any

# --- Final Block Rule ---
# Block anything not explicitly allowed from jail subnet on epair
block log quick on epair from 10.99.0.0/16 to any
