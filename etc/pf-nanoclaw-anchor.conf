# =============================================================================
# NanoClaw pf Anchor Rules
# =============================================================================
#
# This file is designed to be loaded as an anchor from an existing /etc/pf.conf
#
# Prerequisites in /etc/pf.conf (add these lines):
#
#   # NanoClaw jail definitions (add near top with other macros)
#   nanoclaw_net = "10.99.0.0/24"
#   nanoclaw_gw = "10.99.0.1"
#   nanoclaw_if = "lo1"
#
#   # NAT anchor (add in NAT section, before filter rules)
#   nat-anchor "nanoclaw"
#   nat on egress from $nanoclaw_net to any -> (egress:0)
#
#   # Filter anchor (add in filter rules section)
#   anchor "nanoclaw"
#   load anchor "nanoclaw" from "/home/jims/code/nanoclaw/src/etc/pf-nanoclaw-anchor.conf"
#
# Then reload: sudo pfctl -f /etc/pf.conf
#
# =============================================================================

# --- Tables ---
# Claude API endpoint (dynamically resolved)
table <anthropic_api> persist { api.anthropic.com }

# --- DNS Servers ---
# Trusted DNS servers only: Google DNS and Cloudflare DNS
trusted_dns = "{ 8.8.8.8, 1.1.1.1 }"

# --- Allow Rules ---

# Host -> jail (management, jexec, IPC)
pass quick on lo1 from 10.99.0.1 to 10.99.0.0/24

# Established/related connections back to jails
pass quick on lo1 from any to 10.99.0.0/24 keep state

# Jail -> host gateway (IPC, local DNS)
pass quick on lo1 proto { tcp, udp } from 10.99.0.0/24 to 10.99.0.1

# Jail -> DNS (restricted to trusted DNS servers only: 8.8.8.8 and 1.1.1.1)
pass out quick on egress proto udp from 10.99.0.0/24 to $trusted_dns port 53 keep state
pass out quick on egress proto tcp from 10.99.0.0/24 to $trusted_dns port 53 keep state

# Jail -> Claude API (HTTPS only)
pass out quick on egress proto tcp from 10.99.0.0/24 to <anthropic_api> port 443 keep state

# --- Block Everything Else ---
# Log for debugging (view with: sudo tcpdump -n -e -ttt -i pflog0)
block log quick on egress from 10.99.0.0/24 to any
block log quick on lo1 from 10.99.0.0/24 to any
